name: Build macOS Signed Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos-signed:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            artifact_glob: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - name: macos-x64
            os: macos-13
            target: x86_64-apple-darwin
            artifact_glob: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      APPLE_API_KEY: M4PXT78BFC
      APPLE_API_ISSUER: 283a2b54-c0ae-4199-87ef-ee952625f716
      APPLE_TEAM_ID: 4B7HL75P84
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Verify pnpm
        run: pnpm --version

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Validate signing secrets
        shell: bash
        run: |
          test -n "${{ secrets.APPLE_CERTIFICATE }}" || (echo "::error::Missing secret APPLE_CERTIFICATE" && exit 1)
          test -n "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" || (echo "::error::Missing secret APPLE_CERTIFICATE_PASSWORD" && exit 1)
          test -n "$APPLE_API_KEY_P8" || (echo "::error::Missing secret APPLE_API_KEY_P8" && exit 1)

      - name: Import code-signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Detect signing identity
        shell: bash
        run: |
          IDENTITY=$(security find-identity -v -p codesigning | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' | head -n1)
          test -n "$IDENTITY" || (echo "::error::Developer ID Application identity not found in keychain" && exit 1)
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Set App Store Connect key path
        shell: bash
        run: echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/AuthKey_M4PXT78BFC.p8" >> "$GITHUB_ENV"

      - name: Prepare App Store Connect API key file
        shell: bash
        run: |
          printf '%s' "$APPLE_API_KEY_P8" | base64 --decode > "$APPLE_API_KEY_PATH" 2>/dev/null || \
          printf '%s' "$APPLE_API_KEY_P8" | base64 -D > "$APPLE_API_KEY_PATH"
          chmod 600 "$APPLE_API_KEY_PATH"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build signed and notarized macOS app
        run: pnpm tauri build --target ${{ matrix.target }} --bundles app,dmg

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: castor-${{ matrix.name }}-signed-${{ github.sha }}
          if-no-files-found: warn
          path: ${{ matrix.artifact_glob }}
