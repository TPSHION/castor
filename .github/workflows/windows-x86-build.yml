name: Build Windows x86 Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows-x86:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust toolchain (x86 MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app (Windows x86)
        run: pnpm tauri build --target i686-pc-windows-msvc --bundles nsis

      - name: Upload Windows x86 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: castor-windows-x86-${{ github.sha }}
          if-no-files-found: warn
          path: |
            src-tauri/target/i686-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/i686-pc-windows-msvc/release/bundle/msi/*.msi
